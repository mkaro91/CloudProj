<!DOCTYPE html>
<!-- This website template was created by: Rebecca Moorehouse Date: Feburary 24 2026 -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Our Team</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/upload.css">
</head>

<body>

  <nav>
    <ul class="nav">
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" id="navDropdown" role="button" data-bs-toggle="dropdown"
          aria-expanded="false">
          Menu
        </a>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navDropdown">
          <li><a class="dropdown-item" href="/">Home</a></li>
          <li><a class="dropdown-item" href="/upload-page">Upload</a></li>
        </ul>
      </li>
    </ul>
  </nav>

  <!-- Sends file data to the Flask backend -->
  <!-- action="/upload": the Flask route handling the upload (confirm with backend dev) -->
  <!-- method="post": required for sending file data -->
  <!-- enctype="multipart/form-data": required when form includes a file input -->
  <form action="/upload" method="post" enctype="multipart/form-data">

    <h2 class="Main-title">Upload Your Document</h2>

    <ol>
      <li>Click on the Choose File button</li>
      <li>Pick the document you want a summary of</li>
      <li>Click on the Upload button and get your summary</li>
    </ol>

    <!-- Links label to input via matching "for" and "id", improves accessibility -->
    <label for="fileSelect">Filename:</label>

    <!-- name="photo": key the Flask backend uses to reference this file (confirm with backend dev) -->
    <input type="file" name="file" id="fileSelect" class="form-control" accept=".txt,.pdf,.docx">

    <!-- "value" sets the button label -->
    <input type="submit" value="Upload" class="btn btn-primary mt-2">

  </form>

  <!--make sure the scanner can accept pdf and docx-->
  <div class="text-center mt-3">
    <ul class="nav nav-tabs justify-content-center" id="fileTypeTabs">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#txt">TXT</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#pdf">PDF</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#docx">DOCX</button>
      </li>
    </ul>
    <div class="tab-content mt-2">
      <div class="tab-pane fade show active" id="txt">
        <img src="/static/images/txt-file.png" alt="Text file" width="800">
      </div>
      <div class="tab-pane fade" id="pdf">
        <img src="/static/images/pdf-file.png" alt="PDF file" width="800">
      </div>
      <div class="tab-pane fade" id="docx">
        <img src="/static/images/docx-file.png" alt="Word file" width="800">
      </div>
    </div>
  </div>

  <footer class="text-center py-3">
    <p class="second">&copy; Copyright 2026. All Rights Reserved <br>
      2026 W-CSD-4553-01-Cloud Computing - 4.
    </p>
    <button onclick="scrollToTop()" class="back-to-top">Return To Top</button>
  </footer>

  <script>
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
